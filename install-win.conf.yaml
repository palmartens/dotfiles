- clean: ['~']

- clean:
    ~/.config:
      recursive: true

- defaults:
    link:
      create: true
      relink: true

- link:
    $USERPROFILE/.gitconfig:
        path: gitconfig
        force: true
    $USERPROFILE/.ssh/config:
        path: ssh/config
        create: true
        force: true
    $LOCALAPPDATA/Packages/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe/LocalState/settings.json:
      path: config/winget/settings.json
      create: true
      force: true
    $LOCALAPPDATA/starship/starship.toml:
      path: starship
      force: true
      create: true            
    $LOCALAPPDATA/Packages/Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe/LocalState/settings.json:
      path: config/wt/settings.json
      force: true
      create: true

- shell:
  - description: "Copy Powershell script to Onedrive folder (no link, sync with onedrive)"
    command: 'pwsh -NoProfile -Command "$p = Join-Path $env:OneDrive ''Documents/PowerShell''; if (Test-Path $p) { Copy-Item -Path ''script/pwsh/*'' -Destination $p -Recurse -Force }"'        
  - 
    command: echo "Done!"
    description: Ready
    stdout: true
  

